name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-flight runs on the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  MIX_ENV: test
  ELIXIR_VERSION: "1.18.4"
  OTP_VERSION: "28.0.1"

jobs:
  compile:
    name: Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}
      - name: Compile (all apps)
        # NOT using --warnings-as-errors yet — the repo has living
        # warnings (typespec drift in ex_ccrypto, unreachable
        # {:error, _} clauses, etc.). Mix still exits non-zero on
        # *errors*, so new breakage is caught.
        run: mix compile

  test:
    name: Test ${{ matrix.package }}
    needs: compile
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - pki_crypto
          - pki_ca_engine
          - pki_ra_engine
          - pki_validation
          - pki_platform_engine
          - pki_platform_portal
          - pki_tenant
          - pki_tenant_web
          - pki_mnesia
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Create test databases
        # Each package's config/test.exs configures one or more of
        # these repos. Create them all up front (IF NOT EXISTS via
        # `|| true`) so any package-specific mix alias that calls
        # `ecto.create --quiet` is a no-op.
        run: |
          for db in pki_platform_test pki_ca_engine_test pki_ra_engine_test \
                    pki_validation_test pki_audit_trail_test pki_tenant_test; do
            PGPASSWORD=postgres psql -h localhost -U postgres \
              -c "CREATE DATABASE $db;" || true
          done

      - name: Fetch package deps
        working-directory: src/${{ matrix.package }}
        run: mix deps.get

      - name: Run tests
        working-directory: src/${{ matrix.package }}
        # No --cover yet. Coverage thresholds in mix.exs range
        # 70% but actual numbers are 2.2%–55% on 8 of 9 packages,
        # so gating on coverage would keep CI red. Enable per
        # package as coverage climbs past threshold via focused
        # test-writing PRs.
        run: mix test
